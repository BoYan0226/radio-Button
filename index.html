<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Radio Button UI Designs</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      background: #1f1f21;
      font-family: "Montserrat", Arial, sans-serif;
      padding-top: 200px;
      padding-bottom: 300px;
    }

    .page {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 200px;
    }

    /* -------------------- */
    /* 1 */
    /* -------------------- */
    .top-radio-wrapper {
      width: 630px;
      background: #e8e8e8;
      border-radius: 18px;
      padding: 6px;
      position: relative;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.45);
    }

    .top-radio-wrapper input[type="radio"] {
      display: none;
    }

    .top-radio-group {
      display: flex;
      align-items: center;
      position: relative;
      height: 44px;
    }

    .top-slider {
      position: absolute;
      top: 0;
      left: 0;
      width: calc((100% - 20px) / 3);
      height: 44px;
      background: linear-gradient(to bottom, #2a003d, #1f002d);
      border-radius: 14px;
      box-shadow: 0 0 14px rgba(108, 44, 168, 0.7);
      transition: transform 0.35s ease;
      z-index: 1;
    }

    .top-option {
      flex: 1;
      height: 44px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      font-size: 20px;
      font-weight: 600;
      color: #8f8f8f;
      position: relative;
      z-index: 2;
      border-radius: 14px;
    }

    .top-divider {
      width: 5px;
      height: 28px;
      background: #c9c9c9;
      border-radius: 10px;
      position: relative;
      z-index: 2;
    }

    #top-option1:checked ~ .top-radio-group label[for="top-option1"],
    #top-option2:checked ~ .top-radio-group label[for="top-option2"],
    #top-option3:checked ~ .top-radio-group label[for="top-option3"] {
      color: #7d63d8;
    }

    #top-option1:checked ~ .top-radio-group .top-slider {
      transform: translateX(0);
    }

    #top-option2:checked ~ .top-radio-group .top-slider {
      transform: translateX(calc(100% + 10px));
    }

    #top-option3:checked ~ .top-radio-group .top-slider {
      transform: translateX(calc(200% + 20px));
    }

    /* -------------------- */
    /* 2 */
    /* -------------------- */
    .bottom-radio-group {
      display: flex;
      flex-direction: column;
      gap: 28px;
      align-items: flex-start;
    }

    .bottom-radio-group input[type="radio"] {
      display: none;
    }

    .bottom-option {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 205px;
      height: 66px;
      padding: 0 26px;
      border-radius: 999px;
      background: #e8e8e8;
      color: #8d8d8d;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 1px;
      cursor: pointer;
      box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5);
      transition: all 0.35s ease;
      box-sizing: border-box;
    }


    /* 选中后按钮变长 + 变蓝 */
    #bottom-option1:checked + label,
    #bottom-option2:checked + label,
    #bottom-option3:checked + label {
      width: 360px;
      background: #5883f0;
      color: #f3f5ff;
    }

    /* 没选中时保持灰白 */
    #bottom-option1:not(:checked) + label,
    #bottom-option2:not(:checked) + label,
    #bottom-option3:not(:checked) + label {
      background: #e8e8e8;
      color: #8d8d8d;
    }
    
    /* 3 */
.third-radio-group {
  display: flex;
  flex-direction: column;
  gap: 28px;
  align-items: flex-start;
}

.third-radio-group input[type="radio"] {
  display: none;
}

.third-option {
  width: 250px;
  height: 66px;
  background: #e8e8e8;
  border-radius: 999px;
  display: flex;
  align-items: center;
  padding: 0 18px;
  box-sizing: border-box;
  cursor: pointer;
  box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5);
  color: #7d7d7d;
  font-size: 22px;
  font-weight: 700;
}

.dot {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  background: transparent;
  margin-right: 18px;
  flex-shrink: 0;
}

#third-option1:checked + label .dot,
#third-option2:checked + label .dot,
#third-option3:checked + label .dot {
  background: #1d2b5f;
}

/*4 */
.dropdown-box {
  width: 245px;
  background: #343434;
  border-radius: 16px;
  box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5);
  overflow: hidden;
}

.dropdown-selected {
  height: 54px;
  line-height: 54px;
  padding: 0 22px;
  box-sizing: border-box;
  color: #d8d8d8;
  font-size: 22px;
  font-weight: 700;
  background: rgba(255, 255, 255, 0.03);
  border: 1px solid rgba(255, 255, 255, 0.35);
  border-radius: 16px;
  cursor: pointer;
}

.dropdown-menu {
  max-height: 0;
  overflow: hidden;
  padding: 0;
  opacity: 0;
  transition: max-height 0.35s ease, opacity 0.25s ease, padding 0.35s ease;
}

.dropdown-menu.show {
  max-height: 220px;
  padding: 8px 0 12px 0;
  opacity: 1;
}

.dropdown-item {
  padding: 16px 22px;
  color: #8f8f8f;
  font-size: 22px;
  font-weight: 700;
  cursor: pointer;
}

.dropdown-item:hover {
  color: #f0f0f0;
}

/* 5*/
.simple-tab-group {
  display: flex;
  justify-content: space-around;
  align-items: center;
  width: 530px;
  height: 60px;
  background: #e8e8e8;
  border-radius: 8px;
  box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5);
}

.simple-tab-group input[type="radio"] {
  display: none;
}

.simple-tab {
  cursor: pointer;
  font-size: 22px;
  font-weight: 700;
  color: #7f7f7f;
  transition: color 0.25s ease;
}

/* 选中后文字变色 */
#tab1:checked + label,
#tab2:checked + label,
#tab3:checked + label {
  color: #a15e5e;
}

/* 6 */
.vertical-slider-box input[type="radio"] {
  display: none;
}

.vertical-panel {
  width: 170px;
  height: 185px;
  background: #cfcfcf;
  border-radius: 14px;
  position: relative;
  box-shadow: 0 14px 24px rgba(0, 0, 0, 0.5);
  display: flex;
  flex-direction: column;
  justify-content: space-around;
  align-items: center;
  padding: 18px 0;
  box-sizing: border-box;
}

.vertical-item {
  width: 100%;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #7f7f7f;
  cursor: pointer;
  position: relative;
  z-index: 2;
  transition: color 0.25s ease;
}

.vertical-highlight {
  position: absolute;
  left: -20px;
  top: 13px;
  width: 210px;
  height: 56px;
  border-radius: 18px;
  background: linear-gradient(to right, #5a5a5a, #8c8c8c, #5a5a5a);
  border: 1px solid rgba(255, 255, 255, 0.45);
  box-sizing: border-box;
  z-index: 1;
  transition: transform 0.35s ease;
}

/* 文字选中变浅 */
#v-option1:checked ~ .vertical-panel label[for="v-option1"],
#v-option2:checked ~ .vertical-panel label[for="v-option2"],
#v-option3:checked ~ .vertical-panel label[for="v-option3"] {
  color: #f0f0f0;
}

/* 滑块移动 */
#v-option1:checked ~ .vertical-panel .vertical-highlight {
  transform: translateY(0);
}

#v-option2:checked ~ .vertical-panel .vertical-highlight {
  transform: translateY(52px);
}

#v-option3:checked ~ .vertical-panel .vertical-highlight {
  transform: translateY(104px);
}

/* 7 */
/* 新的竖向 blob UI */
.blob-menu input[type="radio"] {
  display: none;
}

.blob-card {
  width: 178px;
  height: 222px;
  background: #d3d3d3;
  border-radius: 18px;
  position: relative;
  box-shadow: 0 16px 26px rgba(0, 0, 0, 0.5);
}

.blob-option {
  position: absolute;
  left: 0;
  width: 100%;
  text-align: center;
  font-size: 22px;
  font-weight: 700;
  color: #7d7d7d;
  cursor: pointer;
  z-index: 2;
  transition: color 0.25s ease;
}

.blob-option1 {
  top: 34px;
}

.blob-option2 {
  top: 97px;
}

.blob-option3 {
  top: 160px;
}

/* 中间白色不规则块 */
.blob-shape {
  position: absolute;
  left: 18px;
  top: 85px;
  width: 142px;
  height: 52px;
  background: #f4f4f4;
  border-radius: 28px 34px 24px 30px / 20px 26px 24px 22px;
  z-index: 1;
  transition: transform 0.35s ease;
}

/* 选中的文字变黑 */
#blob1:checked ~ .blob-card .blob-option1,
#blob2:checked ~ .blob-card .blob-option2,
#blob3:checked ~ .blob-card .blob-option3 {
  color: #202020;
}

/* 白色块移动 */
#blob1:checked ~ .blob-card .blob-shape {
  transform: translateY(-63px);
}

#blob2:checked ~ .blob-card .blob-shape {
  transform: translateY(0);
}

#blob3:checked ~ .blob-card .blob-shape {
  transform: translateY(63px);
}

/* 8 */
/* 三角形选中菜单 */
.triangle-menu input[type="radio"] {
  display: none;
}

.triangle-card {
  width: 165px;
  height: 166px;
  background: #d3d3d3;
  border-radius: 16px;
  position: relative;
  box-shadow: 0 16px 26px rgba(0, 0, 0, 0.5);
}

.triangle-item {
  position: absolute;
  left: 20px;
  width: calc(100% - 40px);
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 21px;
  font-weight: 600;
  color: #7b7b7b;
  cursor: pointer;
  transition: color 0.25s ease;
}

.triangle-item1 {
  top: 18px;
}

.triangle-item2 {
  top: 68px;
}

.triangle-item3 {
  top: 118px;
}

.triangle-icon {
  width: 0;
  height: 0;
  border-top: 9px solid transparent;
  border-bottom: 9px solid transparent;
  border-left: 14px solid transparent;
  transition: border-left-color 0.25s ease;
}

/* 选中时三角形出现 */
#tri-option1:checked ~ .triangle-card .triangle-item1 .triangle-icon,
#tri-option2:checked ~ .triangle-card .triangle-item2 .triangle-icon,
#tri-option3:checked ~ .triangle-card .triangle-item3 .triangle-icon {
  border-left-color: #8d6565;
}

/* 选中时文字可稍微深一点*/
#tri-option1:checked ~ .triangle-card .triangle-item1,
#tri-option2:checked ~ .triangle-card .triangle-item2,
#tri-option3:checked ~ .triangle-card .triangle-item3 {
  color: #6f6f6f;
}

/* 9 */
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1f1f21;
  font-family: Arial, sans-serif;
}

.loop-menu {
  position: relative;
  width: 800px;
  height: 450px;
}

.loop-menu input[type="radio"] {
  display: none;
}

.loop-bg {
  width: 100%;
  height: 100%;
  background-image: url("loops.png");
  background-repeat: no-repeat;
  background-position: center;
  background-size: contain;
  position: relative;
}

.loop-option {
  position: absolute;
  color: rgba(220, 220, 220, 0.65);
  font-size: 22px;
  cursor: pointer;
  transition: color 0.25s ease, text-shadow 0.25s ease;
}

.option1 {
  left: 230px;
  top: 265px;
  transform: rotate(-24deg);
}

.option2 {
  left: 340px;
  top: 95px;
  transform: rotate(18deg);
}

.option3 {
  left: 570px;
  top: 235px;
  transform: rotate(-18deg);
}

#loop1:checked ~ .loop-bg .option1,
#loop2:checked ~ .loop-bg .option2,
#loop3:checked ~ .loop-bg .option3 {
  color: #eefcff;
  text-shadow: 0 0 6px rgba(220, 245, 255, 0.9),
               0 0 12px rgba(180, 235, 255, 0.7);
}

/* 10 */
.flash-ui input[type="radio"] {
  display: none;
}

.flash-ui {
  width: 820px;
  height: 360px;
  position: relative;
}

/* 手电筒角度*/
.flash-ui {
  --torch-angle: -130deg;
  --move-distance: 172px;
}

.flash-scene {
  width: 100%;
  height: 100%;
  position: relative;
}

.flashlight {
  position: absolute;
  left: 365px;
  top: 70px;
  width: 90px;
  z-index: 4;
  transform-origin: center center;
  transition: transform 0.35s ease;
}

.light-beam {
  position: absolute;
  left: 345px;
  top: 130px;
  width: 130px;
  height: 150px;
  background: rgba(255, 255, 255, 0.9);
  filter: blur(10px);
  clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  z-index: 1;
  transition: transform 0.35s ease;
}

.flash-bar {
  position: absolute;
  left: 140px;
  bottom: 40px;
  width: 540px;
  height: 38px;
  background: #050505;
  border-radius: 999px;
  box-shadow: 0 12px 22px rgba(0, 0, 0, 0.5);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 28px;
  box-sizing: border-box;
  z-index: 3;
}

.flash-item {
  width: 33.33%;
  text-align: center;
  font-size: 18px;
  color: #7a7a7a;
  cursor: pointer;
  position: relative;
  z-index: 4;
  transition: color 0.25s ease;
}

.flash-slider {
  position: absolute;
  left: 187px;
  top: 3px;
  width: 167px;
  height: 32px;
  background: #f2f2f2;
  border-radius: 999px;
  box-shadow: 0 0 8px rgba(255, 235, 180, 0.55);
  z-index: 2;
  transition: transform 0.35s ease;
}

#flash-option1:checked ~ .flash-scene .flash-bar label[for="flash-option1"],
#flash-option2:checked ~ .flash-scene .flash-bar label[for="flash-option2"],
#flash-option3:checked ~ .flash-scene .flash-bar label[for="flash-option3"] {
  color: #6f6f6f;
}

/* 手电筒：平移 + 可自由改角度 */
#flash-option1:checked ~ .flash-scene .flashlight {
  transform: translateX(calc(-1 * var(--move-distance))) rotate(var(--torch-angle));
}

#flash-option2:checked ~ .flash-scene .flashlight {
  transform: translateX(0) rotate(var(--torch-angle));
}

#flash-option3:checked ~ .flash-scene .flashlight {
  transform: translateX(var(--move-distance)) rotate(var(--torch-angle));
}

/* 光束：只平移 */
#flash-option1:checked ~ .flash-scene .light-beam {
  transform: translateX(calc(-1 * var(--move-distance)));
}

#flash-option2:checked ~ .flash-scene .light-beam {
  transform: translateX(0);
}

#flash-option3:checked ~ .flash-scene .light-beam {
  transform: translateX(var(--move-distance));
}

/* 白色滑块：只平移 */
#flash-option1:checked ~ .flash-scene .flash-slider {
  transform: translateX(calc(-1 * var(--move-distance)));
}

#flash-option2:checked ~ .flash-scene .flash-slider {
  transform: translateX(0);
}

#flash-option3:checked ~ .flash-scene .flash-slider {
  transform: translateX(var(--move-distance));
}

/* 11 */
.drag-select-ui {
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 40px 0;
}

.drag-options {
  position: relative;
  width: 618px;
  height: 170px;
}

.drag-option {
  position: absolute;
  top: 0;
  width: 206px;
  height: 56px;
  background: #dddddd;
  color: #7a7a7a;
  font-size: 18px;
  font-weight: 600;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 1;
}

.drag-option:nth-child(1) {
  left: 0;
  border-radius: 8px 0 0 8px;
}

.drag-option:nth-child(2) {
  left: 206px;
}

.drag-option:nth-child(3) {
  left: 412px;
  border-radius: 0 8px 8px 0;
}

.drag-option.active {
  color: #5f5f5f;
}

.sticky-note {
  position: absolute;
  top: -6px;
  left: 250px;
  width: 124px;
  height: 124px;
  background: transparent;
  border: 14px solid #88c9c8;
  border-radius: 4px;
  cursor: grab;
  user-select: none;
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 12px;
  box-sizing: border-box;
  z-index: 3;
  transition: left 0.2s ease;
}

.sticky-note:active {
  cursor: grabbing;
}

.sticky-move {
  color: white;
  font-size: 20px;
  font-weight: 700;
  line-height: 1;
  pointer-events: none;
}

.sticky-cover {
  position: absolute;
  left: -10px;
  right: -10px;
  bottom: -10px;
  height: 60px;
  background: #88c9c8;
  z-index: -1;
}

/* 12 */
.dark-tab-ui input[type="radio"] {
  display: none;
}

.dark-tab-ui {
  display: flex;
  justify-content: center;
  align-items: center;
}

.dark-tab-bar {
  position: relative;
  width: 490px;
  height: 54px;
  background: #2d2d2d;
  border-radius: 14px;
  display: flex;
  align-items: center;
  padding: 0 8px;
  box-sizing: border-box;
  box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35);
}

.dark-tab-slider {
  position: absolute;
  top: 4px;
  left: 8px;
  width: 158px;
  height: 46px;
  background: #202020;
  border-radius: 12px;
  transition: transform 0.3s ease;
  z-index: 1;
}

.dark-tab-option {
  width: 158px;
  text-align: center;
  font-size: 18px;
  font-weight: 700;
  color: #b9d9a8;
  cursor: pointer;
  position: relative;
  z-index: 2;
  transition: color 0.25s ease;
}

/* 选中的文字颜色 */
#dark-tab1:checked ~ .dark-tab-bar label[for="dark-tab1"],
#dark-tab2:checked ~ .dark-tab-bar label[for="dark-tab2"],
#dark-tab3:checked ~ .dark-tab-bar label[for="dark-tab3"] {
  color: #4ee0b2;
}

/* 黑色块移动 */
#dark-tab1:checked ~ .dark-tab-bar .dark-tab-slider {
  transform: translateX(0);
}

#dark-tab2:checked ~ .dark-tab-bar .dark-tab-slider {
  transform: translateX(158px);
}

#dark-tab3:checked ~ .dark-tab-bar .dark-tab-slider {
  transform: translateX(316px);
}

/* 13 */
.piggy-ui {
  display: flex;
  justify-content: center;
  align-items: center;
}

.piggy-box {
  width: 260px;
  height: 240px;
  background: #d9d9d9;
  border-radius: 6px;
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 16px;
  box-sizing: border-box;
}

.piggy-img {
  width: 150px;
  position: relative;
  z-index: 2;
}

/* 飞下来的硬币 */
.falling-coin {
  width: 46px;
  height: 46px;
  background: #e0b52b;
  border-radius: 50%;
  position: absolute;
  left: 107px;
  top: 12px;
  opacity: 0;
  z-index: 3;
}

/* 开始动画时加这个类 */
.falling-coin.animate {
  animation: coinDrop 0.7s ease forwards;
}

@keyframes coinDrop {
  0% {
    transform: translateY(-20px);
    opacity: 1;
  }
  100% {
    transform: translateY(70px);
    opacity: 0;
  }
}

.coin-row {
  position: absolute;
  bottom: 34px;
  display: flex;
  gap: 18px;
}

.coin-btn {
  width: 46px;
  height: 46px;
  background: #e0b52b;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  color: rgba(120, 110, 70, 0.45);
  font-size: 12px;
  cursor: pointer;
  user-select: none;
}

/* 被点击后先隐藏 */
.coin-btn.hide {
  opacity: 0;
}

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #1f1f21;
}

/* 14 */
.toilet-ui {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 40px;
}

.toilet-roll {
  width: 140px;
  height: 140px;
  object-fit: contain;
  cursor: pointer;
  display: block;
}

.toilet-roll.selected {
  height: 220px;
}

/* 15 */
.player-ui {
  position: relative;
  width: 540px;
  margin: 30px auto 0;
}

.player-handle {
  width: 360px;
  height: 70px;
  border: 10px solid #e5e5e5;
  border-bottom: none;
  border-radius: 6px 6px 0 0;
  margin: 0 auto;
  box-sizing: border-box;
}

.player-box {

<script>
  const stickyNote = document.getElementById("stickyNote");
  const optionElements = document.querySelectorAll(".drag-option");

  const snapPositions = [37, 247, 450];
  const maxLeft = 412;

  let isDragging = false;
  let startX = 0;
  let startLeft = 0;

  function setActiveOption(index) {
    optionElements.forEach((option, i) => {
      option.classList.toggle("active", i === index);
    });
  }

  function getNearestIndex(leftValue) {
    let nearestIndex = 0;
    let minDistance = Math.abs(leftValue - snapPositions[0]);

    for (let i = 1; i < snapPositions.length; i++) {
      const distance = Math.abs(leftValue - snapPositions[i]);
      if (distance < minDistance) {
        minDistance = distance;
        nearestIndex = i;
      }
    }

    return nearestIndex;
  }

  stickyNote.addEventListener("mousedown", function (event) {
    isDragging = true;
    startX = event.clientX;
    startLeft = stickyNote.offsetLeft;
    stickyNote.style.transition = "none";
  });

  document.addEventListener("mousemove", function (event) {
    if (!isDragging) return;

    const moveX = event.clientX - startX;
    let newLeft = startLeft + moveX;

    if (newLeft < 0) newLeft = 0;
    if (newLeft > maxLeft) newLeft = maxLeft;

    stickyNote.style.left = newLeft + "px";

    const nearestIndex = getNearestIndex(newLeft);
    setActiveOption(nearestIndex);
  });

  document.addEventListener("mouseup", function () {
    if (!isDragging) return;

    isDragging = false;
    stickyNote.style.transition = "left 0.2s ease";

    const currentLeft = stickyNote.offsetLeft;
    const nearestIndex = getNearestIndex(currentLeft);

    stickyNote.style.left = snapPositions[nearestIndex] + "px";
    setActiveOption(nearestIndex);
  });

  setActiveOption(1);
</script>

<script>
  function dropCoin(clickedCoin) {
    const fallingCoin = document.getElementById("fallingCoin");

    clickedCoin.classList.add("hide");

    fallingCoin.classList.remove("animate");
    void fallingCoin.offsetWidth; 
    fallingCoin.classList.add("animate");

    setTimeout(function () {
      clickedCoin.classList.remove("hide");
    }, 700);
  }
</script>
